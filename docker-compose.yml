version: '3.8'

services:
  local-proxy:
    image: ghcr.io/tarampampam/3proxy:latest
    container_name: local-proxy
    restart: unless-stopped
    env_file:
      - .env
    command:
      - /bin/sh
      - -c
      - |
        cat > /tmp/3proxy.cfg <<EOF
        nserver 1.1.1.1
        nserver 8.8.8.8
        nscache 65536

        timeouts 1 5 30 60 180 1800 15 60
        log stdout

        auth none
        allow *

        parent 1000 http ${PROXY_HOST} ${PROXY_PORT} ${PROXY_USER} ${PROXY_PASSWORD}
        proxy -p8888
        flush
        EOF

        exec /usr/bin/3proxy /tmp/3proxy.cfg
    networks:
      - bot-network

  telegram-bot:
    build: .
    container_name: telegram-calendar-bot
    restart: unless-stopped
    depends_on:
      - local-proxy
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - TZ=Europe/Moscow
      - JAVA_TOOL_OPTIONS=-Djava.net.useSystemProxies=true -DproxySet=true -Dhttp.proxyHost=local-proxy -Dhttp.proxyPort=8888 -Dhttps.proxyHost=local-proxy -Dhttps.proxyPort=8888 -Dhttp.nonProxyHosts=localhost|127.0.0.1
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"
    networks:
      - bot-network

networks:
  bot-network:
    driver: bridge